name: Build Release APK

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android-SDK
        uses: android-actions/setup-android@v3

      - name: Create private.properties for build
        env:
          PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
        run: |
          if [ -n "$PRIVATE_PROPERTIES" ]; then
            printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
          else
            touch ./private.properties
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build installable universal APKs
        run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

      - name: Verify installable universal APK outputs
        run: |
          set -euo pipefail
          debug_count=$(find app/build/outputs/apk/github/debug -maxdepth 1 -name 'FieldMind-*-githubDebug-signed-universal.apk' | wc -l | tr -d ' ')
          release_count=$(find app/build/outputs/apk/github/release -maxdepth 1 -name 'FieldMind-*-githubRelease-signed-universal.apk' | wc -l | tr -d ' ')
          if [ "$debug_count" != "1" ] || [ "$release_count" != "1" ]; then
            echo "Expected exactly one signed universal debug APK and one signed universal release APK."
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Github Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/github/debug/FieldMind-*-githubDebug-signed-universal.apk
            app/build/outputs/apk/github/release/FieldMind-*-githubRelease-signed-universal.apk
