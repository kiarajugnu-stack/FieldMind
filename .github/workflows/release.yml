name: Build Release APK

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android-SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build release universal APKs (all flavors)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleGithubRelease assembleFdroidRelease --stacktrace

      - name: Verify APK outputs
        run: |
          set -uo pipefail
          echo "=== APK outputs ==="
          find app/build/outputs/apk -type f -name '*.apk' -print || true
          github_release=$(find app/build/outputs/apk/github/release -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)
          fdroid_release=$(find app/build/outputs/apk/fdroid/release -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$github_release" ] && [ -z "$fdroid_release" ]; then
            echo "::error::No APKs found at all. Build may have failed."
            exit 1
          fi
          if [ -n "$github_release" ]; then echo "✅ GitHub release APK: $github_release"; fi
          if [ -n "$fdroid_release" ]; then echo "✅ F-Droid release APK: $fdroid_release"; fi

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Github Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/github/release/*.apk
            app/build/outputs/apk/fdroid/release/*.apk
