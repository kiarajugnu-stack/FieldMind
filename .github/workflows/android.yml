name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint
      
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*.*
            app/build/reports/lint/**/*.html
            app/build/reports/lint/**/*.xml
          if-no-files-found: warn
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup keystore
      id: keystore
      continue-on-error: true
      run: |
        mkdir -p .config
        echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > release.keystore
        echo "${{ secrets.KEYSTORE_PROPERTIES_BASE64 }}" | base64 -d > .config/keystore.properties
        if [ ! -s release.keystore ] || [ ! -s .config/keystore.properties ]; then
          rm -f release.keystore .config/keystore.properties
          echo "Keystore files are empty — secrets not configured"
          exit 1
        fi

        key_alias=$(sed -n 's/^key_alias=//p' .config/keystore.properties | head -1)
        store_password=$(sed -n 's/^store_password=//p' .config/keystore.properties | head -1)
        key_password=$(sed -n 's/^key_password=//p' .config/keystore.properties | head -1)
        if [ -z "$key_alias" ] || [ -z "$store_password" ] || [ -z "$key_password" ]; then
          rm -f release.keystore .config/keystore.properties
          echo "Keystore properties are incomplete — falling back to debug signing"
          exit 1
        fi

        if ! keytool -list -keystore release.keystore -alias "$key_alias" -storepass "$store_password" -keypass "$key_password" >/dev/null 2>&1; then
          rm -f release.keystore .config/keystore.properties
          echo "Keystore validation failed — falling back to debug signing"
          exit 1
        fi

        echo "Keystore setup and validation succeeded" >> $GITHUB_STEP_SUMMARY

    - name: Keystore fallback notice
      if: steps.keystore.outcome == 'failure'
      run: |
        echo "::warning::Keystore secrets not available — building debug-signed APKs instead of release-signed."
        echo "## ⚠️ Keystore not configured" >> $GITHUB_STEP_SUMMARY
        echo "APKs are debug-signed. Add KEYSTORE_FILE_BASE64 and KEYSTORE_PROPERTIES_BASE64 secrets for proper signing." >> $GITHUB_STEP_SUMMARY

    - name: Build installable universal APKs for PR preview
      run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

    - name: Verify installable universal APK outputs
      run: |
        set -uo pipefail
        echo "=== APK outputs ==="
        find app/build/outputs/apk -type f -name '*.apk' -print || true
        signed_debug=$(find app/build/outputs/apk/github/debug -maxdepth 1 -name 'FieldMind-*-githubDebug-signed-universal.apk' 2>/dev/null | head -1)
        signed_release=$(find app/build/outputs/apk/github/release -maxdepth 1 -name 'FieldMind-*-githubRelease-signed-universal.apk' 2>/dev/null | head -1)
        debug_apk="${signed_debug:-$(find app/build/outputs/apk/github/debug -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)}"
        release_apk="${signed_release:-$(find app/build/outputs/apk/github/release -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)}"
        if [ -z "$debug_apk" ] && [ -z "$release_apk" ]; then
          echo "::error::No APKs found at all. Build may have failed."
          exit 1
        fi
        if [ -n "$debug_apk" ]; then echo "✅ Debug APK: $debug_apk"; fi
        if [ -n "$release_apk" ]; then echo "✅ Release APK: $release_apk"; fi
        if [ -z "$signed_release" ]; then
          echo "::warning::Release APK is not release-signed (debug-signed fallback)."
        fi

    - name: Collect installable APK release bundle
      run: |
        set -euo pipefail
        artifact_dir="artifact-installable-apks"
        rm -rf "$artifact_dir"
        mkdir -p "$artifact_dir"

        echo "Build completed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$artifact_dir/build_info.txt"
        echo "Event: ${{ github.event_name }}" >> "$artifact_dir/build_info.txt"
        echo "Commit: ${{ github.sha }}" >> "$artifact_dir/build_info.txt"
        echo "Branch: ${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" >> "$artifact_dir/build_info.txt"

        mapfile -t apks < <(find app/build/outputs/apk/github -type f -name '*.apk' | sort)
        if [ "${#apks[@]}" -eq 0 ]; then
          echo "::error::No APKs found to upload. Expected outputs under app/build/outputs/apk/github."
          exit 1
        fi
        printf 'APK files:\n' >> "$artifact_dir/build_info.txt"
        for apk in "${apks[@]}"; do
          cp "$apk" "$artifact_dir/"
          printf -- '- %s\n' "$apk" >> "$artifact_dir/build_info.txt"
        done

    - name: Upload installable APK release bundle
      uses: actions/upload-artifact@v4
      with:
        name: fieldmind-${{ github.event_name }}-${{ github.run_number }}-installable-apks
        path: artifact-installable-apks/*
        if-no-files-found: error
        retention-days: 14
