name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint
      
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create private.properties for build
      env:
        PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
      run: |
        if [ -n "$PRIVATE_PROPERTIES" ]; then
          printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
        else
          touch ./private.properties
        fi

    - name: Build unsigned universal APKs for PR/release preview
      run: ./gradlew assembleGithubDebug assembleGithubRelease -PunsignedApkOnly=true --stacktrace

    - name: Verify unsigned universal APK outputs
      run: |
        set -euo pipefail
        debug_count=$(find app/build/outputs/apk/github/debug -maxdepth 1 -name 'FieldMind-*-githubDebug-unsigned-universal.apk' | wc -l | tr -d ' ')
        release_count=$(find app/build/outputs/apk/github/release -maxdepth 1 -name 'FieldMind-*-githubRelease-unsigned-universal.apk' | wc -l | tr -d ' ')
        if [ "$debug_count" != "1" ] || [ "$release_count" != "1" ]; then
          echo "Expected exactly one unsigned universal debug APK and one unsigned universal release APK."
          find app/build/outputs/apk -type f -name '*.apk' -print
          exit 1
        fi

    - name: Generate build info
      if: github.event_name == 'pull_request'
      run: |
        echo "Build completed at: $(date)" > build_info.txt
        echo "Commit: ${{ github.sha }}" >> build_info.txt
        echo "Branch: ${{ github.head_ref }}" >> build_info.txt

    - name: Upload PR unsigned APK release bundle
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: fieldmind-pr-${{ github.event.pull_request.number }}-unsigned-apks
        path: |
          app/build/outputs/apk/github/debug/FieldMind-*-githubDebug-unsigned-universal.apk
          app/build/outputs/apk/github/release/FieldMind-*-githubRelease-unsigned-universal.apk
          build_info.txt
        if-no-files-found: error
        retention-days: 14
