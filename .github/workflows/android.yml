name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint
      
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    - name: Build installable universal APKs for PR preview
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

    - name: Verify installable universal APK outputs
      run: |
        set -uo pipefail
        echo "=== APK outputs ==="
        find app/build/outputs/apk -type f -name '*.apk' -print || true
        signed_debug=$(find app/build/outputs/apk/github/debug -maxdepth 1 -name 'FieldMind-*-githubDebug-signed-universal.apk' 2>/dev/null | head -1)
        signed_release=$(find app/build/outputs/apk/github/release -maxdepth 1 -name 'FieldMind-*-githubRelease-signed-universal.apk' 2>/dev/null | head -1)
        debug_apk="${signed_debug:-$(find app/build/outputs/apk/github/debug -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)}"
        release_apk="${signed_release:-$(find app/build/outputs/apk/github/release -maxdepth 1 -name '*.apk' 2>/dev/null | head -1)}"
        if [ -z "$debug_apk" ] && [ -z "$release_apk" ]; then
          echo "::error::No APKs found at all. Build may have failed."
          exit 1
        fi
        if [ -n "$debug_apk" ]; then echo "✅ Debug APK: $debug_apk"; fi
        if [ -n "$release_apk" ]; then echo "✅ Release APK: $release_apk"; fi

    - name: Generate build info
      if: github.event_name == 'pull_request'
      run: |
        echo "Build completed at: $(date)" > build_info.txt
        echo "Commit: ${{ github.sha }}" >> build_info.txt
        echo "Branch: ${{ github.head_ref }}" >> build_info.txt

    - name: Upload PR installable APK release bundle
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: fieldmind-pr-${{ github.event.pull_request.number }}-installable-apks
        path: |
          app/build/outputs/apk/github/debug/*.apk
          app/build/outputs/apk/github/release/*.apk
          build_info.txt
        if-no-files-found: error
        retention-days: 14
